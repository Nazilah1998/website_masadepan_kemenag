<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline - Kemenag Barito Utara</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f8fafc, #e0f2f1);
        color: #0f172a;
      }
      .card {
        max-width: 420px;
        padding: 2rem;
        border-radius: 1.5rem;
        background: white;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        text-align: center;
      }
      h1 {
        margin: 1rem 0 0.5rem;
        font-size: 1.5rem;
      }
      p {
        color: #475569;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        margin-top: 1.25rem;
        padding: 0.75rem 1.25rem;
        background: #059669;
        color: white;
        border-radius: 0.75rem;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="/kemenag.svg" alt="Logo Kemenag" width="56" height="56" />
      <h1>Koneksi terputus</h1>
      <p>
        Anda sedang offline. Silakan periksa kembali koneksi internet, lalu
        muat ulang halaman.
      </p>
      <a href="/">Coba Lagi</a>
    </main>
  </body>
</html>
